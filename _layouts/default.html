<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} {{ site.title_separator }} {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
</head>

<body>

  <!-- Subtle grain overlay -->
  <div class="grain-overlay"></div>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ "/" | relative_url }}">
        <span class="title-name">{{ site.title }}</span>
        <span class="title-rule"></span>
      </a>
      <nav class="site-nav">
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a class="{% if page.url == '/' %}active{% endif %}" href="{{ "/" | relative_url }}">About</a></li>
          <li><a class="{% if page.url == '/projects/' %}active{% endif %}" href="{{ "/projects/" | relative_url }}">Work</a></li>
          <li><a class="{% if page.url == '/cv/' %}active{% endif %}" href="{{ "/cv/" | relative_url }}">CV</a></li>
          <li><a href="https://rd496.github.io/" target="_blank">Fast Robots <i class="bi bi-arrow-up-right" style="font-size: 0.7em;"></i></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="content-wrap">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span>&copy; 2025 {{ site.name }}</span>
      </div>
      <div class="footer-right">
        <a href="mailto:rd496@cornell.edu">rd496@cornell.edu</a>
      </div>
    </div>
  </footer>

  <script>
    // Mobile nav toggle
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (toggle) {
      toggle.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        toggle.classList.toggle('open');
      });
    }

    // Fade-in on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
